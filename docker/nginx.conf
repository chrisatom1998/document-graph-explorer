worker_processes auto;
error_log /var/log/nginx/error.log warn;
# nginx-unprivileged runs as a non-root user, which cannot write to
# /var/run or /var/cache — keep the pid and temp paths under /tmp instead.
pid /tmp/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  client_body_temp_path /tmp/client_temp;
  proxy_temp_path /tmp/proxy_temp;
  fastcgi_temp_path /tmp/fastcgi_temp;
  uwsgi_temp_path /tmp/uwsgi_temp;
  scgi_temp_path /tmp/scgi_temp;

  types {
    application/wasm wasm;
    application/javascript mjs;
    application/octet-stream onnx;
  }

  sendfile on;
  keepalive_timeout 65;
  gzip on;
  gzip_types text/css application/javascript text/javascript application/json image/svg+xml application/wasm;

  server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location / {
      # Always revalidate the app shell so users pick up new hashed asset
      # references immediately after a deploy.
      add_header Cache-Control "no-cache";
      include /etc/nginx/security-headers.conf;
      try_files $uri $uri/ /index.html;
    }

    # Self-hosted embedding model files (public/models/) — large and rarely
    # change, but should eventually revalidate rather than cache forever.
    location /models/ {
      add_header Cache-Control "max-age=86400, must-revalidate";
      include /etc/nginx/security-headers.conf;
    }

    # Windows portable .exe only — file(s) in /usr/share/nginx/downloads/.
    # `^~` makes this a priority prefix match so it always wins over the
    # regex asset-caching location below (downloads must never inherit
    # `immutable` caching or be served without Content-Disposition).
    location ^~ /downloads/ {
      alias /usr/share/nginx/downloads/;
      autoindex on;
      default_type application/octet-stream;

      # Deny subdirectories (e.g. win-unpacked/) if ever mounted by mistake.
      # Replicated here (rather than as a separate regex location) because
      # `^~` skips regex location matching entirely for this prefix.
      if ($uri ~ ^/downloads/.+/) {
        return 404;
      }

      add_header Content-Disposition "attachment;" always;
      include /etc/nginx/security-headers.conf;
    }

    # Hashed, content-addressed build output — safe to cache for a year.
    location /assets/ {
      expires 1y;
      add_header Cache-Control "public, immutable";
      include /etc/nginx/security-headers.conf;
    }

    location ~* \.(js|css|wasm|woff2?|png|svg|ico|onnx|mjs)$ {
      include /etc/nginx/security-headers.conf;
    }
  }
}

name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build (production)
        run: npm run build

      - name: Build (air-gapped) + verify zero external hosts
        run: npm run build:airgap

      - name: Enforce eager bundle budget
        run: npm run check:bundle

      - name: Build (Windows .exe) + verify icon embedded
        run: |
          npm run build:exe
          file release/win/run.exe | grep -q 'PE32+ executable' || (echo "run.exe is not a valid PE executable" && exit 1)
          test -f release/win/dist/index.html || (echo "dist/ was not staged next to run.exe" && exit 1)
          node -e "
            const ResEdit = require('resedit');
            const fs = require('fs');
            const exe = ResEdit.NtExecutable.from(fs.readFileSync('release/win/run.exe'));
            const res = ResEdit.NtExecutableResource.from(exe);
            const icons = ResEdit.Resource.IconGroupEntry.fromEntries(res.entries);
            const iconCount = icons.reduce((n, g) => n + g.icons.length, 0);
            if (iconCount < 1) { console.error('No icon embedded in run.exe'); process.exit(1); }
            console.log('run.exe has', iconCount, 'embedded icon(s)');
          "
          test -f docker/downloads/Document\ Graph\ Explorer.exe || (echo "exe was not staged for Docker downloads" && exit 1)

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker compose build

      - name: Smoke-test container
        run: |
          docker compose up -d
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:8080/ >/dev/null; then
              echo "App responded on attempt $i"
              curl -sfI http://127.0.0.1:8080/models/Xenova/bge-small-en-v1.5/config.json | grep -q '200 OK'
              docker compose down
              exit 0
            fi
            sleep 2
          done
          docker compose logs
          docker compose down
          echo "Container never became reachable on :8080" >&2
          exit 1
